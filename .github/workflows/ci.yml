name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./apps/*-website" typecheck
      - run: pnpm --filter "./apps/*-admin" typecheck
      - run: pnpm --filter "./apps/*-backend" typecheck
      - run: pnpm --filter "./packages/*" typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        app:
          [ibrahim-website, john-website, sharaf-website, lordina-website]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mahama/${{ matrix.app }} build

  build-backend:
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        app: [ibrahim-backend, john-backend, sharaf-backend, lordina-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mahama/${{ matrix.app }} build
