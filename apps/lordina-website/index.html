<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="News" href="/rss.xml" />
    <meta name="theme-color" content="#7B2335" />
    <title>Lordina Mahama — First Lady of Ghana</title>
    <style>
      html, body { margin: 0; padding: 0; background: #F7F0E1; }
      .lm-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(180deg, #F7F0E1 0%, #EFE5CF 100%);
        color: #2A1F1A;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: "DM Serif Display", "Playfair Display", Georgia, serif;
        animation: lm-fade-in 0.45s ease-out both;
      }
      .lm-splash::before {
        content: "";
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(196,155,108,0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(196,155,108,0.08) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }
      .lm-splash__top {
        position: absolute; top: 32px; left: 32px; right: 32px;
        display: flex; justify-content: space-between; align-items: center;
        font-family: "Inter", sans-serif;
        font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
        color: #7B8B5C;
      }
      .lm-splash__top em { color: rgba(42,31,26,0.45); font-style: normal; }
      .lm-splash__title {
        position: relative; z-index: 1;
        font-size: clamp(48px, 10vw, 120px);
        line-height: 0.95; font-weight: 600; letter-spacing: -0.02em;
        text-align: center; margin: 0;
        color: #7B2335;
      }
      .lm-splash__title em {
        color: #C49B6C; font-style: italic; font-weight: 500;
        display: block;
      }
      .lm-splash__rule {
        position: relative; z-index: 1;
        margin-top: 28px; height: 2px; width: 0;
        background: #C49B6C;
        animation: lm-rule 1.6s cubic-bezier(0.2,0.65,0.3,0.95) forwards;
      }
      .lm-splash__caption {
        position: relative; z-index: 1; margin-top: 24px;
        font-family: "Cormorant Garamond", serif; font-style: italic;
        font-size: 18px; letter-spacing: 0.08em;
        color: rgba(42,31,26,0.65);
      }
      .lm-splash__dots {
        position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px;
      }
      .lm-splash__dots span {
        width: 6px; height: 6px; background: #A23B47; border-radius: 50%;
        opacity: 0.25; animation: lm-dot 1.2s ease-in-out infinite;
      }
      .lm-splash__dots span:nth-child(2) { animation-delay: 0.18s; }
      .lm-splash__dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes lm-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes lm-rule { to { width: 220px; } }
      @keyframes lm-dot { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .lm-splash { animation: none; }
        .lm-splash__rule { animation: none; width: 220px; }
        .lm-splash__dots span { animation: none; opacity: 0.25; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="lm-splash" role="status" aria-label="Loading">
        <div class="lm-splash__top">
          <span>The Lordina Foundation</span>
          <em>Annual Report · 2026</em>
        </div>
        <h1 class="lm-splash__title">Lordina<em>Mahama.</em></h1>
        <div class="lm-splash__rule"></div>
        <div class="lm-splash__caption">Preparing the programme</div>
        <div class="lm-splash__dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
