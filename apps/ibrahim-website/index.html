<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="News" href="/rss.xml" />
    <meta name="theme-color" content="#08090C" />
    <title>Ibrahim Mahama — Industrialist & Patron of Ghana</title>
    <style>
      html, body { margin: 0; padding: 0; background: #08090C; }
      .im-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(180deg, #08090C 0%, #0E1116 100%);
        color: #F2EDE2;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: "Playfair Display", Georgia, serif;
        animation: im-fade-in 0.45s ease-out both;
      }
      .im-splash::before {
        content: "";
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(201,162,39,0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201,162,39,0.07) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }
      .im-splash__top {
        position: absolute; top: 32px; left: 32px; right: 32px;
        display: flex; justify-content: space-between; align-items: center;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
        color: #C9A227;
      }
      .im-splash__top em { color: rgba(242,237,226,0.55); font-style: normal; }
      .im-splash__title {
        position: relative; z-index: 1;
        font-size: clamp(56px, 14vw, 168px);
        line-height: 0.9; font-weight: 600; letter-spacing: -0.02em;
        text-align: center; margin: 0;
      }
      .im-splash__title em { color: #C9A227; font-style: italic; font-weight: 500; }
      .im-splash__rule {
        position: relative; z-index: 1;
        margin-top: 28px; height: 1px; width: 0;
        background: #C9A227;
        animation: im-rule 1.6s cubic-bezier(0.2,0.65,0.3,0.95) forwards;
      }
      .im-splash__caption {
        position: relative; z-index: 1; margin-top: 24px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
        color: rgba(242,237,226,0.6);
      }
      .im-splash__dots {
        position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px;
      }
      .im-splash__dots span {
        width: 6px; height: 6px; background: #C9A227; border-radius: 50%;
        opacity: 0.25; animation: im-dot 1.2s ease-in-out infinite;
      }
      .im-splash__dots span:nth-child(2) { animation-delay: 0.18s; }
      .im-splash__dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes im-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes im-rule { to { width: 220px; } }
      @keyframes im-dot { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .im-splash { animation: none; }
        .im-splash__rule { animation: none; width: 220px; }
        .im-splash__dots span { animation: none; opacity: 0.25; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="im-splash" role="status" aria-label="Loading">
        <div class="im-splash__top">
          <span>Document № 01 · Cover Sheet</span>
          <em>Annual Report · 2026</em>
        </div>
        <h1 class="im-splash__title">Ibrahim<br /><em>Mahama.</em></h1>
        <div class="im-splash__rule"></div>
        <div class="im-splash__caption">Compiling the dossier</div>
        <div class="im-splash__dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
