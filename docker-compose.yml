      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mahama_john
      - JWT_SECRET=change_me_to_a_long_random_string_at_least_32_chars
      - ALLOWED_ORIGINS=http://localhost:5175,http://localhost:5176
      - PUBLIC_BASE_URL=http://localhost:4002
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sharaf-backend:
    build:
      context: .
