      - "4003:10000"
    environment:
      - NODE_ENV=production
      - SUBJECT=sharaf
      - PORT=10000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mahama_sharaf
      - JWT_SECRET=change_me_to_a_long_random_string_at_least_32_chars
      - ALLOWED_ORIGINS=http://localhost:5177,http://localhost:5178
      - PUBLIC_BASE_URL=http://localhost:4003
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  lordina-backend:
    build:
      context: .
      dockerfile: apps/lordina-backend/Dockerfile
    ports:
      - "4004:10000"
    environment:
      - NODE_ENV=production
      - SUBJECT=lordina
      - PORT=10000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mahama_lordina
      - JWT_SECRET=change_me_to_a_long_random_string_at_least_32_chars
      - ALLOWED_ORIGINS=http://localhost:5179,http://localhost:5180
      - PUBLIC_BASE_URL=http://localhost:4004
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
