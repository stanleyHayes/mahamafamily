# Docker Compose — Local production-like stack
# Usage: docker compose up --build

version: "3.8"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ibrahim-backend:
    build:
      context: .
      dockerfile: apps/ibrahim-backend/Dockerfile
    ports:
      - "4001:10000"
    environment:
      - NODE_ENV=production
      - SUBJECT=ibrahim
      - PORT=10000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mahama_ibrahim
      - JWT_SECRET=change_me_to_a_long_random_string_at_least_32_chars
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
      - PUBLIC_BASE_URL=http://localhost:4001
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  john-backend:
    build:
      context: .
      dockerfile: apps/john-backend/Dockerfile
    ports:
      - "4002:10000"
    environment:
      - NODE_ENV=production
