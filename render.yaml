# Render Blueprint — Mahama Portfolios
# 9 services + 3 MongoDB databases (provision separately on MongoDB Atlas).
# Connect each backend's MONGO_URI as a secret in the Render dashboard.

services:
  # =========================
  # IBRAHIM MAHAMA — backend
  # =========================
  - type: web
    name: ibrahim-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mahama/ibrahim-backend build
    startCommand: pnpm --filter @mahama/ibrahim-backend start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUBJECT
        value: ibrahim
      - key: PORT
        value: 10000
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: mahama_ibrahim
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: mahama-portfolios
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CONTACT_INBOX
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_NAME
        value: Ibrahim Owner
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  - type: web
    name: ibrahim-website
    runtime: static
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mahama/ibrahim-website build
    staticPublishPath: apps/ibrahim-website/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUBJECT
        value: ibrahim
      - key: VITE_PLAUSIBLE_DOMAIN
        sync: false
      - key: VITE_PLAUSIBLE_API_HOST
        sync: false

  - type: web
    name: ibrahim-admin
    runtime: static
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mahama/ibrahim-admin build
    staticPublishPath: apps/ibrahim-admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUBJECT
        value: ibrahim
      - key: VITE_PLAUSIBLE_DOMAIN
        sync: false
      - key: VITE_PLAUSIBLE_API_HOST
        sync: false

